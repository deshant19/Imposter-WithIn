# ============================================================
# Imposter Within — pytest configuration
# ============================================================

[pytest]

# ── Test discovery ───────────────────────────────────────────
testpaths    = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio ──────────────────────────────────────────────────
# "auto" mode: every async test function is treated as a
# coroutine automatically — no @pytest.mark.asyncio needed.
asyncio_mode = auto

# ── Default CLI options ───────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=main
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=80

# ── Warning filters ──────────────────────────────────────────
# Suppress noisy deprecation warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning:anyio
    ignore::DeprecationWarning:httpx
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# ── Custom markers ───────────────────────────────────────────
# Register every custom marker used across the test suite.
# Unregistered markers raise errors when --strict-markers is set.
markers =
    unit:      pure unit tests — no HTTP, no file I/O (fast)
    websocket: tests that exercise WebSocket connections
    slow:      tests that take >1 s; skip with -m "not slow"
